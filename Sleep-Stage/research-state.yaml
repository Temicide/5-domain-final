project:
  title: "H100 Sleep-Stage Classification Research"
  question: "How can the current wearable-signal sleep-stage pipeline be improved for best grouped weighted F1 and Kaggle leaderboard accuracy while using an H100 80 GB Colab Pro runtime effectively?"
  status: active
  started: "2026-06-06"
  domain: "wearable sleep-stage classification"

literature:
  key_papers:
    - id: "gillard2024wearablecnn"
      title: "Sleep staging classification from wearable signals using deep learning"
      authors: "Gillard et al."
      year: 2024
      relevance: "Raw PPG plus accelerometer CNN supports an end-to-end raw-signal model for the competition signals."
    - id: "zhang2017wearablernn"
      title: "Sleep Stage Classification Based on Multi-level Feature Learning and Recurrent Neural Networks via Wearable Device"
      authors: "Zhang et al."
      year: 2017
      relevance: "Heart-rate and actigraphy BLSTM validates temporal sequence modeling for wearable sleep staging."
    - id: "radha2021ppgtransfer"
      title: "A deep transfer learning approach for wearable sleep stage classification with photoplethysmography"
      authors: "Radha et al."
      year: 2021
      relevance: "Shows transfer/regularization value when PPG-labeled data is limited."
    - id: "nam2024insightsleepnet"
      title: "InsightSleepNet"
      authors: "Nam et al."
      year: 2024
      relevance: "InceptionTime, TCN, attention, and uncertainty estimation are directly useful architecture ideas."
    - id: "carter2024wav2sleep"
      title: "wav2sleep"
      authors: "Carter and Tarassenko"
      year: 2024
      relevance: "Supports modality-robust physiological signal encoders and large-scale pretraining direction."
    - id: "brach2026mamba"
      title: "Mamba-based deep learning approach for sleep staging on a wireless multimodal wearable system without electroencephalography"
      authors: "Brach et al."
      year: 2026
      relevance: "Modern long-context sequence models work on non-EEG wearable sleep staging; ensembling helps."
  open_problems:
    - "Wearable-only sleep staging is weaker than PSG/EEG staging; temporal context and subject normalization are critical."
    - "Current local pipeline uses hand-crafted epoch features and shallow models, leaving H100 compute unused."
    - "Public leaderboard feedback is limited and potentially noisy; grouped recording validation remains the main selection criterion."
  evidence_gaps:
    - "Need local grouped CV results for raw-signal deep sequence models on the exact competition data."
    - "Need ablation of transition decoding, temperature scaling, and context length on weighted F1 and per-class F1."

hypotheses:
  - id: H1
    statement: "A raw-signal Conv/Transformer sequence model trained on full 30-second epochs plus neighboring epochs will beat the current context HGB baseline because it can learn morphology, cross-channel timing, and sleep-transition dynamics that summary statistics discard."
    status: active
    motivation: "H100 80 GB VRAM can train large batches and mixed-precision sequence models over all 66,745 epochs, unlike the current CPU-style pipeline."
    parent: null
    priority: high
  - id: H2
    statement: "A stronger calibrated tabular ensemble using richer spectral/HRV/recording-normalized features and LightGBM/CatBoost will improve over sklearn HGB while staying robust on grouped CV."
    status: pending
    motivation: "The existing context feature result already improved grouped F1, and boosted trees are strong for small/medium tabular biomedical datasets."
    parent: null
    priority: high
  - id: H3
    statement: "Combining calibrated model probabilities with sleep-stage transition priors and tunable Viterbi smoothing will improve final sequence consistency without erasing rare stages."
    status: pending
    motivation: "Sleep labels change sparsely; the current smoothing is fixed and not validated as a hyperparameter."
    parent: null
    priority: medium

experiments:
  proxy_metric: "5-fold GroupKFold weighted F1 by recording, with per-class F1 and confusion matrix; secondary metric is public LB only after manual upload."
  baseline_value: 0.51856
  best_value: 0.51856
  total_runs: 0
  trajectory:
    - run_id: "baseline_context_hgb_partial"
      hypothesis: "baseline"
      metric_value: 0.51856
      delta: 0.0
      wall_time_min: null
      change_summary: "Existing partial 3-fold context HistGradientBoosting baseline from project spec."
      timestamp: "2026-06-06T15:51:30+07:00"

outer_loop:
  cycle: 1
  last_direction: "deepen"
  last_reflection: "Literature and existing baseline both support H1 as the primary path. The next step is to run at least one H100 grouped fold of the raw Conv/Transformer model before deciding whether to broaden into LightGBM/CatBoost or Mamba variants."

